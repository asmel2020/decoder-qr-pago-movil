name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: packages/decoder-qr-pago-movil

      - name: Build package
        run: bun run build
        working-directory: packages/decoder-qr-pago-movil

      - name: Publish to npm
        run: npm publish
        working-directory: packages/decoder-qr-pago-movil
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
